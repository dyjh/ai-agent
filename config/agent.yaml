server:
  host: 127.0.0.1
  port: 8765

database:
  url: ${DATABASE_URL}

kb:
  enabled: ${USE_KONWAGE_BASE}
  provider: ${KONWAGE_BASE_PROVIDER}
  registry_path: ./knowledge/registry.yaml

vector:
  backend: ${KONWAGE_BASE_PROVIDER}
  fallback_to_memory: true
  embedding_dimension: ${EMBEDDING_DIMENSION}
  distance: cosine

qdrant:
  url: ${QDRANT_URL}
  api_key: ${QDRANT_API_KEY}
  timeout_seconds: 10
  collections:
    kb: ${QDRANT_COLLECTION_KB}
    memory: ${QDRANT_COLLECTION_MEMORY}
    code: ${QDRANT_COLLECTION_CODE}

pinecone:
  index_host: ${PINECONE_INDEX_HOST}
  api_key: ${PINECONE_API_KEY}
  timeout_seconds: 10
  namespaces:
    kb: ${PINECONE_NAMESPACE_KB}
    memory: ${PINECONE_NAMESPACE_MEMORY}
    code: ${PINECONE_NAMESPACE_CODE}

openai_kb:
  base_url: ${OPENAI_KB_BASE_URL}
  api_key: ${OPENAI_KB_API_KEY}
  timeout_seconds: 30
  vector_stores:
    kb: ${OPENAI_VECTOR_STORE_KB}
    memory: ${OPENAI_VECTOR_STORE_MEMORY}
    code: ${OPENAI_VECTOR_STORE_CODE}

owner:
  preferred_language: zh-CN
  default_shell: bash
  default_workspace: .

llm:
  provider: ${LLM_PROVIDER}
  base_url: ${OPENAI_BASE_URL}
  api_key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL}

embeddings:
  provider: ${EMBEDDING_PROVIDER}
  base_url: ${EMBEDDING_BASE_URL}
  api_key: ${EMBEDDING_API_KEY}
  model: ${EMBEDDING_MODEL}
  timeout_seconds: 30

memory:
  root_dir: ./memory
  auto_extract: true
  auto_apply_low_risk_preferences: false
  write_as_markdown: true

events:
  jsonl_root: ./runs
  audit_root: ./audit

shell:
  enabled: true
  default_timeout_seconds: 60
  max_output_chars: 20000

planner:
  mode: semantic_strict
  semantic_enabled: true
  semantic_shadow_mode: false
  max_retries: 2
  require_schema_validation: true
  conversation_router:
    enabled: true
    mode: llm
    fallback_mode: lightweight
    max_retries: 1
    require_json: true
  chat_gate:
    enabled: true
    mode: lightweight
  tool_planner:
    require_llm_for_tool_choice: true
    enable_fastpath: false
    allow_candidate_fallback: false
    candidate_selector_as_context: true
  shell:
    allow_auto_fallback: false
  debug:
    expose_planner_source: true
    expose_route_source: true
