  schema.LogProb:
    properties:
      bytes:
        description: |-
          Bytes is a list of integers representing the UTF-8 bytes representation of the token.
          Useful in instances where characters are represented by multiple tokens and
          their byte representations must be combined to generate the correct text
          representation. Can be `null` if there is no bytes representation for the token.
        items:
          type: integer
        type: array
      logprob:
        description: |-
          LogProb is the log probability of this token, if it is within the top 20 most likely tokens.
          Otherwise, the value `-9999.0` is used to signify that the token is very unlikely.
        type: number
      token:
        description: |-
          Token represents the text of the token, which is a contiguous sequence of characters
          (e.g., a word, part of a word, or punctuation) as understood by the tokenization process used by the language model.
        type: string
      top_logprobs:
        description: |-
          TopLogProbs is a list of the most likely tokens and their log probability, at this token position.
          In rare cases, there may be fewer than the number of requested top_logprobs returned.
        items:
          $ref: '#/definitions/schema.TopLogProb'
        type: array
    type: object
  schema.LogProbs:
    properties:
      content:
        description: Content is a list of message content tokens with log probability
          information.
        items:
          $ref: '#/definitions/schema.LogProb'
        type: array
    type: object
