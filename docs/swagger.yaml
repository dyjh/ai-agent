        description: CompletionTokensDetails is breakdown of completion tokens.
      completion_tokens:
        description: CompletionTokens is the number of completion tokens.
        type: integer
      prompt_token_details:
        allOf:
        - $ref: '#/definitions/schema.PromptTokenDetails'
        description: PromptTokenDetails is a breakdown of the prompt tokens.
      prompt_tokens:
        description: PromptTokens is the number of prompt tokens, including all the
          input tokens of this request.
        type: integer
      total_tokens:
        description: TotalTokens is the total number of tokens.
        type: integer
    type: object
  schema.ToolCall:
    properties:
      extra:
        additionalProperties: {}
        description: Extra is used to store extra information for the tool call.
        type: object
      function:
        allOf:
        - $ref: '#/definitions/schema.FunctionCall'
        description: Function is the function call to be made.
      id:
        description: ID is the id of the tool call, it can be used to identify the
          specific tool call.
        type: string
      index:
        description: |-
          Index is used when there are multiple tool calls in a message.
          In stream mode, it's used to identify the chunk of the tool call for merging.
        type: integer
      type:
        description: Type is the type of the tool call, default is "function".
        type: string
    type: object
  schema.TopLogProb:
    properties:
      bytes:
        description: |-
          Bytes is a list of integers representing the UTF-8 bytes representation of the token.
          Useful in instances where characters are represented by multiple tokens and
          their byte representations must be combined to generate the correct text
          representation. Can be `null` if there is no bytes representation for the token.
        items:
          type: integer
        type: array
      logprob:
        description: |-
          LogProb is the log probability of this token, if it is within the top 20 most likely tokens.
          Otherwise, the value `-9999.0` is used to signify that the token is very unlikely.
        type: number
      token:
        description: |-
          Token represents the text of the token, which is a contiguous sequence of characters
          (e.g., a word, part of a word, or punctuation) as understood by the tokenization process used by the language model.
        type: string
    type: object
